<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كشتتنا - نسخة سلومي الاحترافية</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #c5a059; --green: #1b3022; --blue: #2980b9; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 50px; }
        
        .top-bar { background: var(--green); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 2000; }
        header { background: var(--green); color: white; text-align: center; padding: 10px 0 30px 0; }
        header h1 { margin: 0; font-size: 20px; color: var(--gold); }

        .container { width: 94%; max-width: 500px; margin: -20px auto 20px; position: relative; z-index: 100; }
        .main-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        
        #map { height: 380px; width: 100%; border-radius: 15px; margin-bottom: 15px; border: 2px solid white; z-index: 1; }
        
        /* زر تحديد الموقع فوق الخريطة */
        .locate-btn {
            position: absolute; top: 25px; right: 25px; z-index: 1000;
            background: white; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid var(--gold);
            cursor: pointer; font-size: 20px; transition: 0.2s;
        }
        .locate-btn:active { transform: scale(0.9); background: #eee; }

        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; font-size: 17px; cursor: pointer; margin-bottom: 10px; color: white; }
        .btn-track { background: var(--gold); box-shadow: 0 4px 0 #a38448; }
        .btn-track.active { background: #ff0000; box-shadow: 0 4px 0 #c0392b; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sub { padding: 12px; border-radius: 10px; border: none; color: white; font-weight: 800; cursor: pointer; font-size: 13px; font-family: 'Cairo'; }
        .save-path { background: var(--green); }
        .save-place { background: var(--blue); }
        .notes-trigger { background: #555; grid-column: span 2; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 400px; padding: 20px; border-radius: 20px; }

        .history-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .tab-btn { background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; text-align: center; font-weight: 800; }
        .tab-content { display: none; background: white; margin-top: 10px; padding: 15px; border-radius: 15px; border: 1px solid #ddd; }

        .record-card { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .view-btn { background: var(--gold); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        
        .user-dot { width: 18px; height: 18px; background: #4285F4; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px #4285F4; }
    </style>
</head>
<body>

<div class="top-bar">
    <div>🕒 <span id="time">00:00</span></div>
    <div>🕋 القبلة: <span id="arrow">⬆️</span></div>
    <div>🌡️ <span id="temp">25°</span></div>
</div>

<header><h1>كشتتنا - بوصلة سلومي</h1></header>

<div class="container">
    <div class="main-card">
        <div class="locate-btn" onclick="goToMyLocation()" title="حدد موقعي">🎯</div>
        
        <div id="map"></div>
        
        <button id="trackBtn" class="btn-main btn-track" onclick="toggleTracking()">🧭 ابدأ تتبع المسار</button>
        
        <div class="action-grid">
            <button class="btn-sub notes-trigger" onclick="openNotes()">📝 إضافة ملاحظة</button>
            <button class="btn-sub save-path" onclick="savePath()">💾 حفظ سجل المسار</button>
            <button class="btn-sub save-place" onclick="savePlace()">📍 حفظ مكان مفضل</button>
        </div>
    </div>

    <div class="history-tabs">
        <div class="tab-btn" onclick="toggleTab('path-hist')">📂 سجل المسارات</div>
        <div class="tab-btn" onclick="toggleTab('place-hist')">🌟 الأماكن المفضلة</div>
    </div>

    <div id="path-hist" class="tab-content"><h3>📋 المسارات المسجلة</h3><div id="path-list"></div></div>
    <div id="place-hist" class="tab-content"><h3>🌟 مفضلاتي</h3><div id="place-list"></div></div>
</div>

<div id="notesModal" class="modal">
    <div class="modal-content">
        <h3>📝 تفاصيل الرحلة</h3>
        <input type="text" id="tripName" placeholder="اسم الرحلة" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
        <textarea id="tripNotes" rows="4" placeholder="اكتب ملاحظاتك هنا..." style="width:100%; border-radius:10px; padding:10px; border:1px solid #ddd; box-sizing:border-box; font-family:'Cairo';"></textarea>
        <button class="btn-main" style="background:var(--green); margin-top:10px;" onclick="closeNotes()">حفظ الملاحظة</button>
    </div>
</div>

<script>
    let map, pathLine, historyPathLine, userPath = [], tracking = false, watchId, userMarker, savedMarker;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([24.4673, 39.6111], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        pathLine = L.polyline([], {color: '#ff0000', weight: 6, opacity: 0.8}).addTo(map);
        historyPathLine = L.polyline([], {color: '#ffff00', weight: 4, dashArray: '5, 10'}).addTo(map);

        // تفعيل الجي بي اس فور التشغيل
        goToMyLocation();

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', e => {
                if (e.alpha !== null) {
                    let angle = e.webkitCompassHeading || (360 - e.alpha);
                    document.getElementById('arrow').style.transform = `rotate(${180 - angle}deg)`;
                }
            });
        }
    }

    function goToMyLocation() {
        navigator.geolocation.getCurrentPosition(p => {
            const pos = [p.coords.latitude, p.coords.longitude];
            if(userMarker) map.removeLayer(userMarker);
            userMarker = L.marker(pos, {icon: L.divIcon({className: 'user-dot'})}).addTo(map);
            map.setView(pos, 16);
        }, err => alert("تأكد من تفعيل الموقع (GPS)"), {enableHighAccuracy: true});
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (!tracking) {
            tracking = true; btn.innerText = "🛑 جاري تسجيل الخيط.."; btn.classList.add('active');
            userPath = []; // تصفير المسار الجديد
            watchId = navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                if(userMarker) map.removeLayer(userMarker);
                userMarker = L.marker(pos, {icon: L.divIcon({className: 'user-dot'})}).addTo(map);
                userPath.push(pos); 
                pathLine.setLatLngs(userPath);
                map.panTo(pos);
            }, null, {enableHighAccuracy: true});
        } else {
            tracking = false; btn.innerText = "🧭 ابدأ تتبع المسار"; btn.classList.remove('active');
            navigator.geolocation.clearWatch(watchId);
        }
    }

    function savePath() {
        let paths = JSON.parse(localStorage.getItem('k_paths_v11') || '[]');
        if(userPath.length === 0) { alert("لا يوجد مسار لتسجيله!"); return; }
        paths.push({ 
            name: document.getElementById('tripName').value || `مسار ${paths.length+1}`, 
            notes: document.getElementById('tripNotes').value,
            path: userPath, date: new Date().toLocaleDateString('ar-SA') 
        });
        localStorage.setItem('k_paths_v11', JSON.stringify(paths));
        alert("تم حفظ المسار في السجل! ✅");
        renderPaths();
    }

    function savePlace() {
        navigator.geolocation.getCurrentPosition(p => {
            let name = prompt("ما اسم هذا المكان المفضل؟");
            if(!name) return;
            let places = JSON.parse(localStorage.getItem('k_places_v11') || '[]');
            places.push({ name, lat: p.coords.latitude, lng: p.coords.longitude, date: new Date().toLocaleDateString('ar-SA') });
            localStorage.setItem('k_places_v11', JSON.stringify(places));
            alert("تم حفظ المكان بنجاح! 📍");
            renderPlaces();
        }, null, {enableHighAccuracy: true});
    }

    function showOnMap(lat, lng, name) {
        if(savedMarker) map.removeLayer(savedMarker);
        map.setView([lat, lng], 17);
        savedMarker = L.marker([lat, lng]).addTo(map).bindPopup(name).openPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showPathOnMap(pathIdx) {
        const data = JSON.parse(localStorage.getItem('k_paths_v11') || '[]');
        const targetPath = data[pathIdx].path;
        historyPathLine.setLatLngs(targetPath);
        map.fitBounds(historyPathLine.getBounds());
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPaths() {
        const data = JSON.parse(localStorage.getItem('k_paths_v11') || '[]');
        document.getElementById('path-list').innerHTML = data.reverse().map((p, i) => `
            <div class="record-card">
                <div><strong>${p.name}</strong><br><small>${p.date}</small></div>
                <button class="view-btn" onclick="showPathOnMap(${data.length-1-i})">🗺️ عرض</button>
            </div>`).join('');
    }

    function renderPlaces() {
        const data = JSON.parse(localStorage.getItem('k_places_v11') || '[]');
        document.getElementById('place-list').innerHTML = data.reverse().map(p => `
            <div class="record-card" style="border-right-color:var(--blue)">
                <div><strong>📍 ${p.name}</strong><br><small>${p.date}</small></div>
                <button class="view-btn" style="background:var(--blue)" onclick="showOnMap(${p.lat}, ${p.lng}, '${p.name}')">عرض</button>
            </div>`).join('');
    }

    function toggleTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'path-hist') renderPaths(); else renderPlaces();
    }

    function openNotes() { document.getElementById('notesModal').style.display = 'flex'; }
    function closeNotes() { document.getElementById('notesModal').style.display = 'none'; }
    
    setInterval(() => { 
        document.getElementById('time').innerText = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}); 
        document.getElementById('temp').innerText = (25 + Math.floor(Math.random() * 3)) + "°";
    }, 1000);
    
    window.onload = initMap;
</script>
</body>
</html>
