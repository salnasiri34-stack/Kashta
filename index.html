<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كشتتنا - لدليل الرحلات</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854866.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854866.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="كشتتنا">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --main-gold: #c5a059; --dark-green: #1b3022; --bg-gray: #f0f2f5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-gray); margin: 0; overflow-x: hidden; }
        
        /* الهيدر الاحترافي */
        .top-bar { background: var(--dark-green); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 600; border-bottom: 2px solid var(--main-gold); }
        .status-item { display: flex; align-items: center; gap: 5px; }

        header { background: var(--dark-green); color: white; text-align: center; padding: 25px 0 45px 0; position: relative; }
        header h1 { margin: 0; font-size: 24px; font-weight: 900; color: var(--main-gold); }

        .container { width: 94%; max-width: 500px; margin: -30px auto 20px; position: relative; z-index: 100; }
        .main-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid #ddd; }

        #map { height: 320px; width: 100%; border-radius: 15px; background: #eee; margin-bottom: 15px; }
        
        input, .info-box { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; font-family: 'Cairo'; font-size: 15px; }
        .info-box { background: #f8f9fa; color: #555; display: flex; justify-content: space-between; font-weight: 600; }

        .btn-track { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; background: var(--main-gold); color: white; box-shadow: 0 4px 0 #a38448; }
        .btn-track.active { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; animation: pulse 1.5s infinite; }
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { padding: 12px; border-radius: 10px; border: none; font-weight: 800; color: white; cursor: pointer; }
        .save-btn { background: var(--dark-green); }
        .view-btn { background: #34495e; }

        /* سجل الرحلات المطور */
        #history-section { display: none; margin-top: 20px; background: white; border-radius: 20px; padding: 15px; }
        .search-bar { position: sticky; top: 0; background: white; padding-bottom: 10px; }
        .trip-card { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 6px solid var(--main-gold); position: relative; }
        .trip-card h4 { margin: 0 0 5px 0; color: var(--dark-green); }
        .trip-card p { margin: 2px 0; font-size: 12px; color: #666; }
        .del-icon { position: absolute; left: 10px; top: 10px; color: #e74c3c; font-size: 18px; cursor: pointer; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="status-item">
        <span id="live-time">00:00</span> | <span id="live-date">--/--</span>
    </div>
    <div class="status-item">
        <span id="temp">جاري الجلب..</span> 🌡️ | <span id="net-speed">ممتاز</span> 📶
    </div>
</div>

<header>
    <h1>كشتتنا - لدليل الرحلات</h1>
</header>

<div class="container">
    <div class="main-card">
        <div id="map"></div>
        <button id="trackBtn" class="btn-track" onclick="toggleTracking()">🧭 ابدأ تتبع المسار</button>
        
        <input type="text" id="trip-name" placeholder="اسم الرحلة (اختياري)">
        
        <div class="info-box">
            <span>المسافة: <b id="dist-val">0.0</b> كم</span>
            <span>المدينة: <b id="city-val">تحديد..</b></span>
        </div>

        <div class="action-row">
            <button class="btn-action save-btn" onclick="saveTrip()">💾 حفظ الرحلة</button>
            <button class="btn-action view-btn" onclick="toggleHistory()">📂 السجل الذكي</button>
        </div>
    </div>

    <div id="history-section">
        <div class="search-bar">
            <input type="text" id="search-input" oninput="searchTrips()" placeholder="🔍 ابحث بالاسم أو المدينة...">
        </div>
        <div id="trips-container"></div>
    </div>
</div>

<script>
    let map, pathLine, userPath = [], tracking = false, watchId, totalDist = 0;
    let currentCity = "المنطقة المفتوحة";

    function updateTopBar() {
        const now = new Date();
        document.getElementById('live-time').innerText = now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('live-date').innerText = now.toLocaleDateString('ar-SA');
        
        // محاكاة قوة الشبكة
        const speeds = ["ممتاز", "جيد جداً", "مستقر"];
        document.getElementById('net-speed').innerText = speeds[Math.floor(Math.random()*speeds.length)];
        
        // جلب درجة الحرارة (محاكاة من أنواء أو مصدر قريب)
        document.getElementById('temp').innerText = (22 + Math.floor(Math.random() * 10)) + "°";
    }
    setInterval(updateTopBar, 1000);

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([24.7136, 46.6753], 6);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        pathLine = L.polyline([], {color: '#c5a059', weight: 6}).addTo(map);
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (!tracking) {
            tracking = true;
            btn.innerText = "🛑 جاري تسجيل المسار...";
            btn.classList.add('active');
            userPath = [];
            totalDist = 0;

            watchId = navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                if(userPath.length > 0) {
                    let last = L.latLng(userPath[userPath.length-1]);
                    totalDist += last.distanceTo(L.latLng(pos)) / 1000;
                }
                userPath.push(pos);
                pathLine.setLatLngs(userPath);
                map.panTo(pos);
                document.getElementById('dist-val').innerText = totalDist.toFixed(2);
                
                // جلب المدينة برمجياً (عن طريق الإحداثيات التقريبية للمثال)
                if(pos[0] > 24 && pos[0] < 25) currentCity = "المدينة المنورة";
                document.getElementById('city-val').innerText = currentCity;

            }, null, {enableHighAccuracy: true});
        } else {
            tracking = false;
            btn.innerText = "🧭 ابدأ تتبع المسار";
            btn.classList.remove('active');
            navigator.geolocation.clearWatch(watchId);
        }
    }

    function saveTrip() {
        let trips = JSON.parse(localStorage.getItem('kashtatna_pro') || '[]');
        const nameInput = document.getElementById('trip-name').value;
        const finalName = nameInput || `رحلة رقم ${trips.length + 1}`;
        
        const newTrip = {
            id: Date.now(),
            name: finalName,
            city: currentCity,
            dist: totalDist.toFixed(2),
            date: new Date().toLocaleDateString('ar-SA'),
            time: new Date().toLocaleTimeString('ar-SA'),
            path: userPath
        };

        trips.push(newTrip);
        localStorage.setItem('kashtatna_pro', JSON.stringify(trips));
        alert(`تم حفظ "${finalName}" بنجاح!`);
        document.getElementById('trip-name').value = "";
        renderTrips();
    }

    function renderTrips(filter = "") {
        const container = document.getElementById('trips-container');
        const trips = JSON.parse(localStorage.getItem('kashtatna_pro') || '[]');
        container.innerHTML = "";

        trips.reverse().filter(t => t.name.includes(filter) || t.city.includes(filter)).forEach(t => {
            container.innerHTML += `
                <div class="trip-card">
                    <span class="del-icon" onclick="deleteTrip(${t.id})">🗑️</span>
                    <h4>${t.name}</h4>
                    <p>🏙️ المنطلق: ${t.city}</p>
                    <p>📏 المسافة: ${t.dist} كم</p>
                    <p>🕒 الوقت: ${t.time} | ${t.date}</p>
                </div>
            `;
        });
    }

    function deleteTrip(id) {
        if(confirm("حذف سجل هذه الرحلة؟")) {
            let trips = JSON.parse(localStorage.getItem('kashtatna_pro') || '[]');
            trips = trips.filter(t => t.id !== id);
            localStorage.setItem('kashtatna_pro', JSON.stringify(trips));
            renderTrips();
        }
    }

    function searchTrips() {
        const val = document.getElementById('search-input').value;
        renderTrips(val);
    }

    function toggleHistory() {
        const sec = document.getElementById('history-section');
        sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        if(sec.style.display === 'block') renderTrips();
    }

    window.onload = initMap;
</script>
</body>
</html>
