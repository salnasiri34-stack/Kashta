<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كشتتنا - رادار الصحراء</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/m5Z4rN0/icon.png">
    <link rel="icon" href="https://i.ibb.co/m5Z4rN0/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary-green: #2d5a27; --orange-btn: #f39c12; --blue-track: #00e5ff; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        header { width: 100%; background: var(--primary-green); color: white; padding: 35px 0; text-align: center; border-bottom: 5px solid #1a3a16; }
        header h1 { margin: 0; font-size: 30px; font-weight: 900; }
        .container { width: 92%; max-width: 550px; margin: -25px auto 20px auto; position: relative; z-index: 10; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* خريطة القمر الصناعي */
        #map { height: 380px; width: 100%; border-radius: 12px; margin-bottom: 15px; background: #222; border: 2px solid #fff; }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 900; font-family: 'Cairo'; font-size: 17px; color: white; }
        
        .btn-track { background: var(--blue-track); color: #000; box-shadow: 0 4px 0 #0097a7; }
        .btn-track.active { background: #ff1744; color: #fff; animation: pulse 1s infinite; }
        
        .btn-save { background: #1a3a16; } 
        .btn-view { background: var(--orange-btn); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        footer { width: 100%; background: #000; color: #fff; text-align: center; padding: 20px 0; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <h1>🏕️ كشتتنا - القمر الصناعي</h1>
    <p>تتبع الأثر عبر الأقمار الصناعية</p>
</header>

<div class="container">
    <div class="card">
        <div id="map"></div>
        
        <button id="trackBtn" class="btn-track" style="margin-bottom: 15px; width: 100%;" onclick="toggleTracking()">🚀 تفعيل خيط العودة (GPS)</button>

        <div style="text-align: right; margin-bottom: 10px;">
            <label style="font-weight: 700; font-size: 14px;">📍 اسم الموقع (اختياري):</label>
            <input type="text" id="destination" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; margin-top:5px;" placeholder="مثال: شعيب دغيم">
        </div>

        <div style="text-align: right; margin-bottom: 15px;">
            <label style="font-weight: 700; font-size: 14px;">🌐 الإحداثيات:</label>
            <input type="text" id="coords" readonly style="width:100%; padding:10px; background:#f9f9f9; border:1px solid #ddd; border-radius:8px;" placeholder="ستظهر تلقائياً عند التتبع">
        </div>

        <div class="btn-stack">
            <button class="btn-save" onclick="saveTrip()">💾 حفظ في السجل</button>
            <button class="btn-view" onclick="toggleSaved()">📂 سجل الرحلات</button>
        </div>
    </div>
    
    <div id="saved-list" style="display:none; margin-top:20px;">
        <div id="items-container"></div>
    </div>
</div>

<footer>
    <p>© 2026 منصة <b>كشتتنا</b> - رادار البر</p>
</footer>

<script>
    var map, marker, pathLine, tracking = false, userPath = [], watchId = null;

    function initMap() {
        // خريطة قمر صناعي وتضاريس من Esri
        map = L.map('map').setView([24.7136, 46.6753], 6); 
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, DigitalGlobe, GeoEye, Earthstar Geographics'
        }).addTo(map);

        // خط التتبع بلون فسفوري واضح فوق القمر الصناعي
        pathLine = L.polyline([], {color: '#00e5ff', weight: 5, opacity: 0.9}).addTo(map);

        map.on('click', function(e) {
            if (!tracking) {
                var lat = e.latlng.lat.toFixed(6), lng = e.latlng.lng.toFixed(6);
                document.getElementById('coords').value = lat + ", " + lng;
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map);
            }
        });
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (!tracking) {
            tracking = true;
            btn.innerText = "🛑 التتبع يعمل.. (أثرك محفوظ)";
            btn.classList.add('active');
            
            // طلب الـ GPS - يعمل حتى بدون أبراج إنترنت
            watchId = navigator.geolocation.watchPosition(function(position) {
                var lat = position.coords.latitude, lng = position.coords.longitude;
                var newPos = [lat, lng];
                userPath.push(newPos);
                pathLine.setLatLngs(userPath);
                document.getElementById('coords').value = lat.toFixed(6) + ", " + lng.toFixed(6);
                
                if (marker) map.removeLayer(marker);
                marker = L.marker(newPos).addTo(map);
                map.panTo(newPos);
            }, function(err){
                alert("تأكد من تشغيل الموقع GPS");
            }, { enableHighAccuracy: true });
        } else {
            tracking = false;
            btn.innerText = "🚀 استئناف التتبع";
            btn.classList.remove('active');
            if (watchId) navigator.geolocation.clearWatch(watchId);
        }
    }

    function saveTrip() {
        const dest = document.getElementById('destination').value || "رحلة بدون اسم";
        const coords = document.getElementById('coords').value || "لا توجد إحداثيات";
        const trip = { dest, coords, date: new Date().toLocaleDateString('ar-SA'), id: Date.now() };
        let trips = JSON.parse(localStorage.getItem('kashtatna_vSat') || '[]');
        trips.push(trip);
        localStorage.setItem('kashtatna_vSat', JSON.stringify(trips));
        alert("تم الحفظ بنجاح! ✅");
    }

    function renderTrips() {
        const container = document.getElementById('items-container');
        const trips = JSON.parse(localStorage.getItem('kashtatna_vSat') || '[]');
        container.innerHTML = trips.length === 0 ? "<p style='text-align:center;'>السجل فارغ</p>" : "";
        trips.reverse().forEach((t) => {
            container.innerHTML += `<div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px; border-right:5px solid var(--orange-btn);"><strong>${t.dest}</strong><br><small>📍 ${t.coords}</small></div>`;
        });
    }

    function toggleSaved() {
        const list = document.getElementById('saved-list');
        list.style.display = list.style.display === 'none' ? 'block' : 'none';
        renderTrips();
    }

    window.onload = initMap;
</script>
</body>
</html>
