<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشتنا | دليل الرحلات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: var(--main); color: white; padding: 25px 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--main); margin-top: 0; font-size: 20px; }
        .item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-left: 12px; accent-color: var(--accent); }
        #map { height: 400px; width: 100%; border-radius: 15px; margin: 15px 0; border: 2px solid #ddd; }
        .btn { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #d35400; }
        .btn-stop { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        footer { text-align: center; padding: 20px; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>🏕️ كشتنا</h1>
    <p>منصة تنظيم الرحلات البرية وتتبع المسارات</p>
</header>

<div class="container">
    <div class="card">
        <h2>📋 مستلزمات الرحلة</h2>
        <div id="checklist">
            <div class="item"><input type="checkbox" id="c1" onchange="save()"><label for="c1">الحطب والمنقل والشاخوف</label></div>
            <div class="item"><input type="checkbox" id="c2" onchange="save()"><label for="c2">الموية وصابون الغسيل</label></div>
            <div class="item"><input type="checkbox" id="c3" onchange="save()"><label for="c3">الفرش والقعدة واللمبات</label></div>
            <div class="item"><input type="checkbox" id="c4" onchange="save()"><label for="c4">شاحن متنقل وأسلاك الشحن</label></div>
        </div>
    </div>

    <div class="card">
        <h2>🛰️ رادار القمر الصناعي</h2>
        <div id="map"></div>
        <button id="trackBtn" class="btn" onclick="toggleTracking()">🚀 بدء تسجيل المسار</button>
        <p id="status" style="text-align:center; font-size:14px; margin-top:10px;">جاهز للتتبع.. ✅</p>
    </div>

    <footer>جميع الحقوق محفوظة © 2026</footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([24.7136, 46.6753], 6);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var path = L.polyline([], {color: '#f1c40f', weight: 6}).addTo(map);
    var marker, watchID;

    window.onload = function() {
        const savedPath = JSON.parse(localStorage.getItem('k_path') || '[]');
        if(savedPath.length > 0) {
            path.setLatLngs(savedPath);
            map.fitBounds(path.getBounds());
            marker = L.marker(savedPath[savedPath.length-1]).addTo(map);
        }
        const checks = JSON.parse(localStorage.getItem('k_check') || '{}');
        Object.keys(checks).forEach(id => { if(document.getElementById(id)) document.getElementById(id).checked = checks[id]; });
    };

    function save() {
        const checks = {};
        document.querySelectorAll('input[type="checkbox"]').forEach(i => checks[i.id] = i.checked);
        localStorage.setItem('k_check', JSON.stringify(checks));
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (btn.innerText.includes("بدء")) {
            btn.innerText = "🛑 إيقاف التسجيل";
            btn.classList.add('btn-stop');
            watchID = navigator.geolocation.watchPosition(pos => {
                const p = [pos.coords.latitude, pos.coords.longitude];
                path.addLatLng(p);
                localStorage.setItem('k_path', JSON.stringify(path.getLatLngs()));
                map.setView(p, 17);
                if(marker) map.removeLayer(marker);
                marker = L.marker(p).addTo(map);
            }, null, {enableHighAccuracy: true});
        } else {
            navigator.geolocation.clearWatch(watchID);
            btn.innerText = "🚀 بدء تسجيل المسار";
            btn.classList.remove('btn-stop');
        }
    }
</script>
</body>
</html>
