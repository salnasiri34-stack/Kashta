<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشتتنا - لدليل الرحلات</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d5a27; --secondary: #f4a460; --accent: #8b4513; --bg: #f4f7f6; }
        
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* حماية بسيطة: منع تحديد النص */
        .no-select { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }

        header { width: 100%; background: var(--primary); color: white; padding: 30px 0; text-align: center; border-bottom: 6px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 28px; font-weight: 900; }

        .container { width: 90%; max-width: 500px; margin: 20px 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--accent); }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-family: 'Cairo'; outline: none; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        button { padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; font-family: 'Cairo'; font-size: 16px; transition: 0.3s; width: 100%; }
        
        .btn-save { background: var(--primary); color: white; box-shadow: 0 4px 0 #1e3d1a; }
        .btn-view { background: var(--secondary); color: white; }
        .btn-reset { background: #e74c3c; color: white; font-size: 14px; }
        
        #saved-list { margin-top: 25px; display: none; width: 100%; }
        .trip-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 6px solid var(--secondary); position: relative; }
        
        /* شريط الحقوق السفلي */
        .copyright-bar { 
            width: 100%; 
            background: #222; 
            color: #888; 
            text-align: center; 
            padding: 15px 0; 
            font-size: 13px; 
            margin-top: auto;
            border-top: 2px solid var(--secondary);
        }
        .copyright-bar b { color: var(--secondary); }
    </style>
</head>
<body class="no-select">

<header>
    <h1>🏕️ كشتتنا - لدليل الرحلات</h1>
    <p>المنصة الرسمية الموثقة لرحلاتك</p>
</header>

<div class="container">
    <div class="card">
        <div class="input-group">
            <label>📍 اسم الوجهة:</label>
            <input type="text" id="destination" placeholder="مثلاً: جبال طويق">
        </div>
        <div class="input-group">
            <label>🌐 الإحداثيات (GPS):</label>
            <input type="text" id="coords" placeholder="أدخل الإحداثيات هنا">
        </div>
        <div class="input-group">
            <label>📅 التاريخ:</label>
            <input type="date" id="trip-date">
        </div>

        <div class="btn-stack">
            <button class="btn-save" onclick="saveTrip()">💾 حفظ الرحلة</button>
            <button class="btn-view" onclick="toggleSaved()">📂 عرض السجل</button>
            <button class="btn-reset" onclick="resetForm()">🔄 إعادة تعيين</button>
        </div>
    </div>

    <div id="saved-list">
        <h3 style="margin-right: 10px;">📋 الرحلات الموثقة:</h3>
        <div id="items-container"></div>
    </div>
</div>

<footer class="copyright-bar">
    <p>© 2026 جميع الحقوق محفوظة لمنصة <b>كشتتنا</b></p>
    <p style="font-size: 10px; opacity: 0.6;">يمنع الاقتباس أو نسخ المحتوى البرمجي دون إذن رسمي</p>
</footer>

<script>
    // حماية إضافية: منع الضغطة اليمين
    document.addEventListener('contextmenu', event => event.preventDefault());

    function saveTrip() {
        const dest = document.getElementById('destination').value;
        const coords = document.getElementById('coords').value;
        const date = document.getElementById('trip-date').value;

        if(!dest || !coords) {
            alert("يرجى ملء البيانات المطلوبة.");
            return;
        }

        const trip = { dest, coords, date, id: Date.now() };
        let trips = JSON.parse(localStorage.getItem('kashtatna_v1') || '[]');
        trips.push(trip);
        localStorage.setItem('kashtatna_v1', JSON.stringify(trips));
        alert("تم الحفظ وتوثيق الحقوق! ✅");
        resetForm();
        renderTrips();
    }

    function renderTrips() {
        const container = document.getElementById('items-container');
        const trips = JSON.parse(localStorage.getItem('kashtatna_v1') || '[]');
        container.innerHTML = trips.length === 0 ? "<p style='text-align:center; color:#999;'>السجل فارغ</p>" : "";
        trips.reverse().forEach((t) => {
            container.innerHTML += `
                <div class="trip-card">
                    <span style="float:left; color:red; cursor:pointer;" onclick="deleteTrip(${t.id})">حذف 🗑️</span>
                    <strong>${t.dest}</strong>
                    <p>🌐 الموقع: ${t.coords}</p>
                    <p>📅 التاريخ: ${t.date || '---'}</p>
                </div>
            `;
        });
    }

    function deleteTrip(id) {
        let trips = JSON.parse(localStorage.getItem('kashtatna_v1') || '[]');
        trips = trips.filter(t => t.id !== id);
        localStorage.setItem('kashtatna_v1', JSON.stringify(trips));
        renderTrips();
    }

    function toggleSaved() {
        const list = document.getElementById('saved-list');
        list.style.display = list.style.display === 'none' ? 'block' : 'none';
        renderTrips();
    }

    function resetForm() {
        document.getElementById('destination').value = "";
        document.getElementById('coords').value = "";
        document.getElementById('trip-date').value = "";
    }
</script>

</body>
</html>
