<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كشتتنا - لدليل الرحلات</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854866.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854866.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --main-gold: #c5a059; --dark-green: #1b3022; --red-path: #ff0000; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 30px; }
        
        .top-bar { 
            background: var(--dark-green); color: white; padding: 8px 12px; 
            display: grid; grid-template-columns: 1fr auto 1fr; 
            align-items: center; font-size: 11px; border-bottom: 2px solid var(--main-gold); 
            position: sticky; top: 0; z-index: 1000; 
        }

        .qibla-unit { display: flex; align-items: center; gap: 4px; color: var(--main-gold); font-weight: bold; }
        #qibla-arrow { display: inline-block; transition: transform 0.2s; font-size: 14px; }

        header { background: var(--dark-green); color: white; text-align: center; padding: 10px 0 30px 0; }
        header h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--main-gold); }

        .container { width: 94%; max-width: 500px; margin: -20px auto 20px; position: relative; z-index: 100; }
        .main-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 12px 30px rgba(0,0,0,0.2); }

        #map { height: 320px; width: 100%; border-radius: 15px; background: #222; margin-bottom: 12px; border: 2px solid white; }
        
        input, textarea { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; 
            margin-bottom: 8px; box-sizing: border-box; font-family: 'Cairo'; font-size: 14px;
        }

        .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .info-item { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; border: 1px solid #ddd; }

        .btn-track { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; font-size: 17px; cursor: pointer; margin-bottom: 10px; background: var(--main-gold); color: white; box-shadow: 0 4px 0 #a38448; }
        .btn-track.active { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; animation: pulse 1.5s infinite; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-act { padding: 12px; border-radius: 10px; border: none; font-weight: 800; color: white; cursor: pointer; font-family: 'Cairo'; font-size: 14px; }
        .save { background: var(--dark-green); }
        .view { background: #34495e; }
        .fav-spot { background: #2980b9; grid-column: span 2; }

        #history-section, #spots-section { display: none; margin-top: 15px; background: white; border-radius: 20px; padding: 15px; border: 1px solid #ddd; }
        .trip-card { background: #fdfdfd; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-right: 5px solid var(--main-gold); position: relative; }
        .trip-note { font-size: 12px; color: #666; background: #eee; padding: 5px; border-radius: 5px; margin-top: 5px; display: block; }
        
        .user-location-dot { width: 15px; height: 15px; background: #4285F4; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 8px rgba(66,133,244,0.6); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div>🕒 <span id="live-time">00:00</span> | 🌡️ <span id="temp">25°</span></div>
    <div class="qibla-unit"><span id="compass-dir">N</span> | 🕋 <span id="qibla-arrow">⬆️</span></div>
    <div style="text-align: left;">📶 <span id="net">ممتاز</span></div>
</div>

<header>
    <h1>كشتتنا - لدليل الرحلات</h1>
</header>

<div class="container">
    <div class="main-card">
        <div id="map"></div>
        
        <div class="info-panel">
            <div class="info-item">📏 <span id="dist">0.0</span> كم</div>
            <div class="info-item">🏙️ <span id="city">المدينة المنورة</span></div>
        </div>

        <input type="text" id="trip-name" placeholder="اسم الرحلة (اختياري)">
        <textarea id="trip-notes" placeholder="الملاحظات (اختياري)" rows="2"></textarea>
        
        <button id="trackBtn" class="btn-track" onclick="toggleTracking()">🧭 ابدأ تتبع المسار (أحمر)</button>
        
        <div class="action-grid">
            <button class="btn-act save" onclick="saveTrip()">💾 حفظ المسار</button>
            <button class="btn-act view" onclick="toggleHistory()">📂 السجل والملاحظات</button>
            <button class="btn-act fav-spot" onclick="saveCurrentSpot()">📍 حفظ كمكان مفضل</button>
        </div>
    </div>

    <div id="history-section">
        <h3 style="margin:0 0 10px 0">📋 سجل المسارات</h3>
        <div id="trips-container"></div>
    </div>

    <div id="spots-section">
        <h3 style="margin:0 0 10px 0">🌟 الأماكن المفضلة</h3>
        <div id="spots-container"></div>
    </div>
</div>

<script>
    let map, pathLine, userPath = [], tracking = false, watchId, totalDist = 0;
    let userMarker;

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView([24.4673, 39.6111], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        pathLine = L.polyline([], {color: '#ff0000', weight: 6, opacity: 0.9}).addTo(map);

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', function(e) {
                if (e.alpha !== null) {
                    let dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW', 'N'];
                    document.getElementById('compass-dir').innerText = dirs[Math.round(e.alpha / 45) % 8];
                    document.getElementById('qibla-arrow').style.transform = `rotate(${180 - e.alpha}deg)`;
                }
            });
        }
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (!tracking) {
            tracking = true; btn.innerText = "🛑 جاري التسجيل.."; btn.classList.add('active');
            watchId = navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                if(userMarker) map.removeLayer(userMarker);
                userMarker = L.marker(pos, {icon: L.divIcon({className: 'user-location-dot'})}).addTo(map);
                if(userPath.length > 0) totalDist += L.latLng(userPath[userPath.length-1]).distanceTo(L.latLng(pos)) / 1000;
                userPath.push(pos); pathLine.setLatLngs(userPath);
                document.getElementById('dist').innerText = totalDist.toFixed(2);
                map.panTo(pos);
            }, null, {enableHighAccuracy: true});
        } else {
            tracking = false; btn.innerText = "🧭 ابدأ تتبع المسار"; btn.classList.remove('active');
            navigator.geolocation.clearWatch(watchId);
        }
    }

    function saveTrip() {
        let trips = JSON.parse(localStorage.getItem('kashtatna_v8') || '[]');
        const name = document.getElementById('trip-name').value || `رحلة رقم ${trips.length + 1}`;
        const notes = document.getElementById('trip-notes').value || "";
        
        trips.push({
            id: Date.now(), name, notes, dist: totalDist.toFixed(2),
            date: new Date().toLocaleDateString('ar-SA'), path: userPath
        });
        localStorage.setItem('kashtatna_v8', JSON.stringify(trips));
        alert("تم الحفظ! ✅");
        // مسح الحقول بعد الحفظ
        document.getElementById('trip-name').value = "";
        document.getElementById('trip-notes').value = "";
        userPath = []; totalDist = 0; pathLine.setLatLngs([]);
    }

    function renderTrips() {
        const container = document.getElementById('trips-container');
        const trips = JSON.parse(localStorage.getItem('kashtatna_v8') || '[]');
        container.innerHTML = "";
        trips.reverse().forEach(t => {
            container.innerHTML += `
                <div class="trip-card">
                    <strong>${t.name}</strong><br>
                    <small>📏 ${t.dist} كم | 📅 ${t.date}</small>
                    ${t.notes ? `<span class="trip-note">📝 الملاحظات: ${t.notes}</span>` : ''}
                </div>`;
        });
    }

    function saveCurrentSpot() {
        let spots = JSON.parse(localStorage.getItem('fav_spots_v8') || '[]');
        const currentPos = userPath.length > 0 ? userPath[userPath.length-1] : [24.4673, 39.6111];
        spots.push({ id: Date.now(), name: `مكان مميز ${spots.length + 1}`, coords: currentPos, date: new Date().toLocaleDateString('ar-SA') });
        localStorage.setItem('fav_spots_v8', JSON.stringify(spots));
        alert("تم حفظ الموقع! 🌟");
    }

    function toggleHistory() {
        const s = document.getElementById('history-section');
        const sp = document.getElementById('spots-section');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
        sp.style.display = s.style.display;
        if(s.style.display === 'block') { renderTrips(); }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-time').innerText = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
        document.getElementById('temp').innerText = (24 + Math.floor(Math.random() * 6)) + "°";
    }, 1000);

    window.onload = initMap;
</script>
</body>
</html>
